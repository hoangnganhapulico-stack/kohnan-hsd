<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOHNAN - KIỂM TRA HSD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app-container { width: 100%; max-width: 500px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; margin-top: 20px; }
        .header { background: linear-gradient(135deg, #e11d48 0%, #be123c 100%); color: white; padding: 20px; text-align: center; }
        .card-body { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        input:focus { border-color: #e11d48; }
        .btn-calc { background-color: #e11d48; color: white; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-top: 10px; border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(225, 29, 72, 0.2); }
        .btn-calc:active { transform: scale(0.98); }
        #result { margin-top: 20px; padding: 20px; border-radius: 15px; display: none; text-align: center; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-pass { background-color: #dcfce7; color: #166534; border: 2px solid #22c55e; }
        .status-fail { background-color: #fee2e2; color: #991b1b; border: 2px solid #ef4444; }
        .status-expired { background-color: #111827; color: white; border: 2px solid #000; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1 class="text-2xl font-bold">KOHNAN PARC MALL</h1>
            <p class="text-xs opacity-90 uppercase tracking-widest mt-1 font-semibold">Công cụ Kiểm tra HSD</p>
        </div>
        <div class="card-body">
            <div class="input-group">
                <label>1. Chọn loại hàng hóa</label>
                <select id="type">
                    <option value="vn">Hàng Việt Nam (Nhận > 65%)</option>
                    <option value="im">Hàng Nhập Khẩu (Nhận > 50%)</option>
                </select>
            </div>
            <div class="input-group">
                <label>2. Ngày Sản Xuất (NSX)</label>
                <input type="date" id="mfgDate">
            </div>
            <div class="input-group">
                <label>3. Ngày Hết Hạn (HSD)</label>
                <input type="date" id="expDate">
            </div>
            <button class="btn-calc" onclick="calculateHSD()">PHÂN TÍCH KẾT QUẢ</button>
            <div id="result">
                <div id="res-status" class="text-2xl font-black mb-2"></div>
                <div id="res-detail" class="text-sm font-medium"></div>
                <div id="res-date-final" class="text-[10px] mt-3 opacity-60 font-bold uppercase"></div>
            </div>
        </div>
        <div class="bg-gray-50 py-4 text-center text-[10px] text-gray-400 font-bold tracking-tighter">
            WAREHOUSE SYSTEM - KOHNAN VIETNAM
        </div>
    </div>

    <script>
        function calculateHSD() {
            const mfgDateVal = document.getElementById('mfgDate').value;
            const expDateVal = document.getElementById('expDate').value;
            const type = document.getElementById('type').value;
            const resDiv = document.getElementById('result');
            const resStatus = document.getElementById('res-status');
            const resDetail = document.getElementById('res-detail');
            const resDateFinal = document.getElementById('res-date-final');

            if (!mfgDateVal || !expDateVal) {
                alert("Vui lòng nhập đầy đủ Ngày Sản Xuất và Ngày Hết Hạn!");
                return;
            }

            const mfg = new Date(mfgDateVal);
            const exp = new Date(expDateVal);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (exp <= mfg) {
                alert("Lỗi: Ngày hết hạn phải sau ngày sản xuất!");
                return;
            }

            const totalLife = exp - mfg;
            const remainingLife = exp - today;
            const percentage = (remainingLife / totalLife) * 100;
            const required = (type === 'vn') ? 65 : 50;

            resDiv.style.display = 'block';
            resDateFinal.innerText = "Hết hạn vào: " + exp.toLocaleDateString('vi-VN');

            if (remainingLife < 0) {
                resDiv.className = "status-expired";
                resStatus.innerText = "🚨 HẾT HẠN";
                resDetail.innerText = "Hàng đã quá hạn sử dụng. Tuyệt đối không nhận.";
            } else if (percentage >= required) {
                resDiv.className = "status-pass";
                resStatus.innerText = "✅ NHẬN HÀNG";
                resDetail.innerHTML = `Tỉ lệ HSD còn lại: <b>${percentage.toFixed(1)}%</b><br>(Đủ điều kiện nhập kho)`;
            } else {
                resDiv.className = "status-fail";
                resStatus.innerText = "❌ TRẢ HÀNG";
                resDetail.innerHTML = `Tỉ lệ còn <b>${percentage.toFixed(1)}%</b> (Yêu cầu > ${required}%)<br>Vui lòng từ chối nhận hàng.`;
            }
        }
    </script>
</body>
</html>
